<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070b13" />
  <title>KBO 정밀 예매 카운트다운</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700;800&display=swap" />
  <style>
    :root{--bg:#070b13;--panel:rgba(15,23,42,.86);--border:rgba(148,163,184,.16);--text:#f8fafc;--muted:#94a3b8;--soft:#64748b;--accent:#38bdf8;--green:#34d399;--amber:#fbbf24;--shadow:0 32px 90px rgba(0,0,0,.45)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 14% 12%,rgba(56,189,248,.18),transparent 34%),radial-gradient(circle at 84% 16%,rgba(52,211,153,.12),transparent 30%),linear-gradient(135deg,#050816 0%,var(--bg) 50%,#020617 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased}body{display:flex;align-items:center;justify-content:center;padding:28px 16px;overflow-x:hidden}button{font:inherit;-webkit-tap-highlight-color:transparent}.app{width:min(900px,100%)}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-size:12px;font-weight:850}.mark{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;color:#020617;background:linear-gradient(135deg,var(--accent),var(--green));box-shadow:0 0 36px rgba(56,189,248,.34);font-weight:950}
    .dashboard{border:1px solid var(--border);border-radius:28px;background:linear-gradient(180deg,rgba(15,23,42,.88),rgba(2,6,23,.9));box-shadow:var(--shadow);backdrop-filter:blur(24px);overflow:hidden}
    .hero{padding:clamp(28px,4vw,52px);border-bottom:1px solid var(--border);text-align:center}.eyebrow{margin:0 0 18px;color:var(--accent);font-size:12px;font-weight:950;letter-spacing:.28em;text-transform:uppercase}
    .selected-card{padding:26px 18px;border:1px solid var(--border);border-radius:22px;background:rgba(2,6,23,.42)}.selected-label{margin:0 0 8px;color:var(--soft);font-size:11px;font-weight:950;letter-spacing:.18em;text-transform:uppercase}.selected-game{margin:0 0 16px;font-size:clamp(15px,2.4vw,18px);font-weight:850;color:var(--text);line-height:1.4;min-height:24px}.countdown{margin:0;font-family:"JetBrains Mono","Roboto Mono","SF Mono",Menlo,Consolas,monospace;font-size:clamp(40px,9vw,86px);font-weight:800;line-height:1;letter-spacing:-.03em;font-variant-numeric:tabular-nums slashed-zero;font-feature-settings:"tnum" 1,"zero" 1;color:var(--green);text-shadow:0 2px 24px rgba(52,211,153,.18)}.countdown.idle{color:var(--soft)}
    .current{margin-top:18px;color:var(--muted);font-size:13px;line-height:1.6}.current strong{color:var(--text);font-family:"JetBrains Mono",monospace;font-weight:700;font-variant-numeric:tabular-nums slashed-zero}
    .actions{margin-top:24px;display:grid;gap:12px;justify-items:center}
    .alert-toggle{width:min(420px,100%);min-height:64px;display:flex;align-items:center;gap:12px;border:1px solid var(--border);background:rgba(15,23,42,.72);color:var(--text);padding:14px 20px;border-radius:18px;cursor:pointer;font-weight:850;text-align:left;transition:.14s}.alert-toggle:hover{border-color:rgba(56,189,248,.45);transform:translateY(-1px)}.alert-dot{width:12px;height:12px;border-radius:50%;background:var(--soft);flex-shrink:0;transition:.2s}.alert-toggle[aria-pressed="true"] .alert-dot{background:var(--green);box-shadow:0 0 14px rgba(52,211,153,.7),0 0 0 4px rgba(52,211,153,.18);animation:dot 1.6s ease-in-out infinite}.alert-text{flex:1;display:flex;flex-direction:column;gap:2px}.alert-title{font-size:15px;font-weight:900}.alert-sub{color:var(--muted);font-size:12px;font-weight:600}@keyframes dot{0%,100%{box-shadow:0 0 14px rgba(52,211,153,.7),0 0 0 4px rgba(52,211,153,.18)}50%{box-shadow:0 0 18px rgba(52,211,153,.95),0 0 0 8px rgba(52,211,153,.08)}}
    .open-link{width:min(420px,100%);min-height:56px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(56,189,248,.32);border-radius:14px;padding:14px 20px;color:var(--text);background:rgba(15,23,42,.72);text-decoration:none;font-weight:900;font-size:15px;transition:.14s}.open-link:hover{border-color:var(--accent);transform:translateY(-1px);background:rgba(56,189,248,.08)}
    .games{padding:24px}.games-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}.games-title{margin:0;font-size:15px;font-weight:950;letter-spacing:-.02em}.games-status{margin:0;color:var(--muted);font-size:12px}.games-status.warn{color:var(--amber)}
    .game-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.game-btn{min-height:104px;border:1px solid var(--border);border-radius:18px;background:rgba(15,23,42,.88);color:var(--text);padding:18px;text-align:left;cursor:pointer;transition:.14s;display:flex;flex-direction:column;gap:6px}.game-btn:hover{border-color:rgba(56,189,248,.4);transform:translateY(-1px)}.game-btn.selected{border-color:var(--accent);box-shadow:0 0 0 4px rgba(56,189,248,.12);background:rgba(56,189,248,.05)}.game-date{color:var(--accent);font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:800;font-variant-numeric:tabular-nums slashed-zero}.game-title{font-size:15px;font-weight:900;line-height:1.3}.game-meta{margin-top:auto;color:var(--soft);font-size:12px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}.game-mini{color:var(--green);font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums slashed-zero}.game-mini.past{color:var(--soft)}
    @media(max-width:620px){body{padding:14px 10px}.app{width:100%}.hero{padding:24px 16px}.games{padding:20px 14px}.game-list{grid-template-columns:1fr}.alert-toggle{min-height:72px}.open-link{min-height:60px;font-size:16px}}
  </style>
</head>
<body>
  <div class="app">
    <header class="brand"><span class="mark">K</span><span>KBO · Precise Booking Countdown</span></header>
    <main class="dashboard">
      <section class="hero">
        <p class="eyebrow">Server Synced Millisecond Countdown</p>
        <article class="selected-card" aria-live="polite">
          <p class="selected-label">선택된 경기 예매 오픈까지</p>
          <p class="selected-game" id="selectedGame">경기를 선택하세요</p>
          <p class="countdown idle" id="countdown">--:--:--.---</p>
        </article>
        <p class="current">현재 시각 <strong id="currentTime">00:00:00.000</strong> · <span id="dateText">날짜 계산 중</span></p>
        <div class="actions">
          <button class="alert-toggle" id="alertToggle" type="button" aria-pressed="false">
            <span class="alert-dot" aria-hidden="true"></span>
            <span class="alert-text">
              <span class="alert-title" id="alertTitle">사운드 알림 켜기</span>
              <span class="alert-sub" id="alertSub">T-5분 / T-1분 / 정각에 비프음</span>
            </span>
          </button>
          <a class="open-link" href="https://m.ticketlink.co.kr/sports/137/57" target="_blank" rel="noopener noreferrer">
            티켓링크 일정 페이지 열기 ↗
          </a>
        </div>
      </section>
      <section class="games">
        <div class="games-head">
          <h2 class="games-title">예매 오픈 예정 경기</h2>
          <p class="games-status" id="status">불러오는 중…</p>
        </div>
        <div class="game-list" id="gameList"></div>
      </section>
    </main>
  </div>
  <script>
    (() => {
      'use strict';

      const TIME_PROXY_PATH = '/api/time';
      const BOOKING_DATA_PATH = './booking-data.json';
      const TICKETLINK_URL = 'https://m.ticketlink.co.kr/sports/137/57';

      const $ = (id) => document.getElementById(id);
      const els = {
        countdown: $('countdown'),
        selectedGame: $('selectedGame'),
        currentTime: $('currentTime'),
        dateText: $('dateText'),
        alertToggle: $('alertToggle'),
        alertTitle: $('alertTitle'),
        alertSub: $('alertSub'),
        gameList: $('gameList'),
        status: $('status'),
      };

      const state = {
        localOffset: Date.now() - performance.now(),
        serverOffset: 0,
        games: [],
        selectedId: null,
        firedAlerts: new Set(),
        lastDiff: null,
        lastRenderedSec: -1,
        lastLocalSyncAt: 0,
      };

      const ALERT_THRESHOLDS = [
        { key: '5m', ms: 5 * 60 * 1000 },
        { key: '1m', ms: 1 * 60 * 1000 },
        { key: '0',  ms: 0 },
      ];

      const pad = (v, w = 2) => String(v).padStart(w, '0');

      // ---------------- AUDIO ----------------
      const audio = {
        ctx: null,
        armed: false,
        async enable() {
          try {
            const Ctor = window.AudioContext || window.webkitAudioContext;
            if (!Ctor) return false;
            this.ctx = this.ctx || new Ctor();
            if (this.ctx.state === 'suspended') await this.ctx.resume();
            this.armed = true;
            this._chord([{ freq: 880, dur: 90 }, { freq: 1320, dur: 90, delay: 110 }]);
            return true;
          } catch { this.armed = false; return false; }
        },
        disable() { this.armed = false; },
        play(key) {
          if (!this.armed || !this.ctx) return;
          const patterns = {
            '5m': [{ freq: 740, dur: 200 }, { freq: 740, dur: 200, delay: 320 }],
            '1m': [{ freq: 1320, dur: 120 }, { freq: 1320, dur: 120, delay: 180 }, { freq: 1320, dur: 120, delay: 360 }, { freq: 1320, dur: 120, delay: 540 }],
            '0':  [{ freq: 880, dur: 180 }, { freq: 1320, dur: 220, delay: 200 }, { freq: 1760, dur: 350, delay: 440 }],
          };
          this._chord(patterns[key] || []);
        },
        _chord(notes) {
          const ctx = this.ctx; if (!ctx) return;
          const now = ctx.currentTime;
          for (const n of notes) {
            const startsAt = now + (n.delay || 0) / 1000;
            const dur = n.dur / 1000;
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.type = 'triangle'; osc.frequency.value = n.freq;
            gain.gain.setValueAtTime(0, startsAt);
            gain.gain.linearRampToValueAtTime(0.28, startsAt + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, startsAt + dur);
            osc.connect(gain).connect(ctx.destination);
            osc.start(startsAt); osc.stop(startsAt + dur + 0.05);
          }
        },
      };

      function updateAlertToggleUI() {
        els.alertToggle.setAttribute('aria-pressed', audio.armed ? 'true' : 'false');
        els.alertTitle.textContent = audio.armed ? '사운드 알림 ON' : '사운드 알림 켜기';
        els.alertSub.textContent = audio.armed
          ? '선택한 경기 T-5분 · T-1분 · 정각에 비프음'
          : 'T-5분 / T-1분 / 정각에 비프음';
      }

      // ---------------- CLOCK SYNC ----------------
      function sampleLocalOffset() {
        const before = performance.now(), wall = Date.now(), after = performance.now();
        return wall - ((before + after) / 2);
      }
      function resyncLocalClock(hard = false) {
        const sampled = sampleLocalOffset();
        state.localOffset = hard ? sampled : state.localOffset + ((sampled - state.localOffset) * 0.18);
      }
      function correctedNow() { return performance.now() + state.localOffset + state.serverOffset; }
      function localFromPerf(perfTime) { return perfTime + state.localOffset; }

      function readServerTimeFromJson(data) {
        for (const key of ['serverIso', 'iso', 'utc_datetime', 'datetime', 'currentDateTime', 'dateTime', 'time']) {
          if (data[key]) { const parsed = Date.parse(data[key]); if (Number.isFinite(parsed)) return parsed; }
        }
        if (Number.isFinite(data.serverTime)) return data.serverTime;
        if (Number.isFinite(data.fallbackServerTime)) return data.fallbackServerTime;
        if (Number.isFinite(data.unixtime)) return data.unixtime * 1000;
        if (Number.isFinite(data.epoch)) return data.epoch;
        return null;
      }
      async function fetchServerSample() {
        const url = `${TIME_PROXY_PATH}?target=${encodeURIComponent(TICKETLINK_URL)}&t=${Date.now()}`;
        const start = performance.now();
        const response = await fetch(url, { cache: 'no-store', headers: { Accept: 'application/json' } });
        const end = performance.now(), rtt = end - start;
        const data = await response.json();
        const serverMs = readServerTimeFromJson(data);
        if (!Number.isFinite(serverMs)) throw new Error('서버 시각 파싱 실패');
        const upstreamRtt = Number.isFinite(data.proxyRtt) ? Math.max(0, rtt - data.proxyRtt) : rtt;
        const midpoint = start + upstreamRtt / 2;
        return { offset: serverMs - localFromPerf(midpoint), rtt: upstreamRtt };
      }
      async function syncWithServer() {
        const settled = await Promise.allSettled([fetchServerSample(), fetchServerSample(), fetchServerSample()]);
        const samples = settled.filter((r) => r.status === 'fulfilled').map((r) => r.value);
        if (!samples.length) return;
        samples.sort((a, b) => a.rtt - b.rtt);
        const best = samples[0];
        state.serverOffset = state.serverOffset === 0 ? best.offset : (state.serverOffset * 0.4 + best.offset * 0.6);
      }

      // ---------------- GAME DATA ----------------
      function openMsOf(game) {
        if (Number.isFinite(game.reserveOpenDate)) return game.reserveOpenDate;
        // fallback: combine game.date + targetTime (KST)
        if (!game.date) return null;
        const m = /^(\d{1,2}):(\d{2})(?::(\d{2})(?:\.(\d{1,3}))?)?$/.exec(game.targetTime || '11:00:00.000');
        if (!m) return null;
        const [y, mo, d] = game.date.split('-').map(Number);
        const dt = new Date(Date.UTC(y, mo - 1, d, Number(m[1]) - 9, Number(m[2]), Number(m[3] || 0), Number((m[4] || '0').padEnd(3, '0'))));
        return dt.getTime();
      }
      function gameTitle(game) {
        const opp = game.opponent || '';
        return opp ? `삼성 vs ${opp}` : '삼성 라이온즈 경기';
      }
      function selectGame(id) {
        state.selectedId = id;
        state.firedAlerts = new Set();
        state.lastDiff = null;
        const game = state.games.find((g) => g.id === id);
        els.selectedGame.textContent = game ? gameTitle(game) + (game.venueName ? ` · ${game.venueName.trim()}` : '') : '경기를 선택하세요';
        [...els.gameList.querySelectorAll('.game-btn')].forEach((btn) => btn.classList.toggle('selected', btn.dataset.gameId === id));
      }
      function renderGameList(games, meta) {
        const now = correctedNow();
        // openMs 가 있는 경기만, 미래 우선 정렬
        const enriched = games
          .map((g, i) => ({ ...g, id: g.id || `g${i}`, openMs: openMsOf(g) }))
          .filter((g) => g.openMs && g.bookingUrl)
          .sort((a, b) => a.openMs - b.openMs);
        state.games = enriched;
        const upcoming = enriched.filter((g) => g.openMs > now);
        const updated = meta?.updatedAt ? new Date(meta.updatedAt).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }) : '알 수 없음';
        els.gameList.innerHTML = '';
        if (!enriched.length) {
          els.status.textContent = `표시할 경기가 없습니다. (갱신: ${updated})`;
          els.status.classList.add('warn');
          return;
        }
        els.status.textContent = `${enriched.length}개 (다가오는 경기 ${upcoming.length}개 · 갱신: ${updated})`;
        els.status.classList.remove('warn');
        enriched.forEach((game) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'game-btn';
          btn.dataset.gameId = game.id;
          // 경기 날짜/시간이 있으면 그것, 없으면 예매 오픈 시각으로 폴백
          let dateLine;
          if (game.date) {
            dateLine = `${game.date}${game.time ? ` · ${game.time.slice(0, 5)}` : ''}`;
          } else {
            const openD = new Date(game.openMs);
            const pad = (n) => String(n).padStart(2, '0');
            dateLine = `예매 오픈 ${openD.getFullYear()}-${pad(openD.getMonth() + 1)}-${pad(openD.getDate())} ${pad(openD.getHours())}:${pad(openD.getMinutes())}`;
          }
          btn.innerHTML = `
            <span class="game-date">${dateLine}</span>
            <span class="game-title">${gameTitle(game)}</span>
            <span class="game-meta">
              <span>${(game.venueName || '').trim() || '경기장 미정'}</span>
              <span class="game-mini" data-mini="${game.id}">--:--:--</span>
            </span>
          `;
          btn.addEventListener('click', () => selectGame(game.id));
          els.gameList.appendChild(btn);
        });
        // auto-select: 다가오는 첫 경기
        if (upcoming[0]) selectGame(upcoming[0].id);
      }
      async function loadBookingData() {
        try {
          const response = await fetch(`${BOOKING_DATA_PATH}?t=${Date.now()}`, { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          renderGameList(Array.isArray(data.games) ? data.games : [], data);
        } catch (e) {
          els.status.textContent = `booking-data.json 로드 실패: ${e.message}`;
          els.status.classList.add('warn');
        }
      }

      // ---------------- RENDER LOOP ----------------
      function formatTime(ms) {
        const d = new Date(ms);
        return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad(d.getMilliseconds(), 3)}`;
      }
      function formatDuration(diff) {
        const sign = diff < 0 ? '-' : '', abs = Math.abs(Math.trunc(diff));
        const h = Math.floor(abs / 3600000), m = Math.floor((abs % 3600000) / 60000), s = Math.floor((abs % 60000) / 1000), ms = abs % 1000;
        return `${sign}${pad(h)}:${pad(m)}:${pad(s)}.${pad(ms, 3)}`;
      }
      function formatMini(diff) {
        if (diff <= 0) return '오픈됨';
        const abs = Math.trunc(diff);
        const days = Math.floor(abs / 86400000);
        if (days > 0) return `D-${days}`;
        const h = Math.floor(abs / 3600000), m = Math.floor((abs % 3600000) / 60000), s = Math.floor((abs % 60000) / 1000);
        return `${pad(h)}:${pad(m)}:${pad(s)}`;
      }
      function checkAlerts(diff) {
        if (state.lastDiff == null) { state.lastDiff = diff; return; }
        for (const t of ALERT_THRESHOLDS) {
          if (state.firedAlerts.has(t.key)) continue;
          if (state.lastDiff > t.ms && diff <= t.ms) {
            state.firedAlerts.add(t.key);
            audio.play(t.key);
          }
        }
        state.lastDiff = diff;
      }
      function render(timestamp) {
        if (timestamp - state.lastLocalSyncAt >= 2000) { resyncLocalClock(); state.lastLocalSyncAt = timestamp; }
        const now = correctedNow();
        els.currentTime.textContent = formatTime(now);

        // selected countdown
        const selected = state.games.find((g) => g.id === state.selectedId);
        if (selected) {
          const diff = selected.openMs - now;
          els.countdown.textContent = diff > 0 ? formatDuration(diff) : '00:00:00.000';
          els.countdown.classList.toggle('idle', false);
          checkAlerts(diff);
        } else {
          els.countdown.textContent = '--:--:--.---';
          els.countdown.classList.add('idle');
        }

        // mini countdowns (초당 1회만 갱신)
        const curSec = Math.floor(now / 1000);
        if (curSec !== state.lastRenderedSec) {
          state.lastRenderedSec = curSec;
          for (const game of state.games) {
            const el = els.gameList.querySelector(`[data-mini="${game.id}"]`);
            if (!el) continue;
            const diff = game.openMs - now;
            el.textContent = formatMini(diff);
            el.classList.toggle('past', diff <= 0);
          }
          // date line (1초마다 갱신)
          const d = new Date(now);
          const weekday = new Intl.DateTimeFormat('ko-KR', { weekday: 'long' }).format(d);
          const full = new Intl.DateTimeFormat('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }).format(d);
          els.dateText.textContent = `${full} ${weekday}`;
        }

        requestAnimationFrame(render);
      }

      // ---------------- INIT ----------------
      els.alertToggle.addEventListener('click', async () => {
        if (audio.armed) audio.disable(); else await audio.enable();
        updateAlertToggleUI();
      });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          resyncLocalClock(true);
          syncWithServer();
        }
      });

      updateAlertToggleUI();
      resyncLocalClock(true);
      loadBookingData().then(() => syncWithServer());
      setInterval(syncWithServer, 60_000);
      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
