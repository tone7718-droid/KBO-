name: Daily Samsung Lions booking update

# NOTE: 자동 daily cron 비활성화됨.
# CI 환경은 PerimeterX 에 차단되어 dom-fallback 으로 쓰레기 데이터를 긁고,
# git-auto-commit 이 그것을 main 에 덮어써 배포를 망가뜨린 사례가 있었음.
# 데이터 갱신은 사용자가 NetLog 캡처 후 parse:netlog 로 수동 수행한다.
# 필요 시에만 GitHub UI 에서 수동 실행(workflow_dispatch).
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-booking-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: npm run scrape
        env:
          TICKETLINK_SAMSUNG_URL: https://m.ticketlink.co.kr/sports/137/57
          SCRAPER_MODE: ci
          SCRAPER_HEADLESS: 'true'
          SCRAPER_KEEP_ON_FAILURE: 'true'
        continue-on-error: true

      - name: Commit updated booking data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update samsung lions booking data'
          file_pattern: booking-data.json
